baseURL: 'https://blog.o10s.ch/'
languageCode: 'en-us'
title: 'o10s'
theme: 'PaperMod'

sectionPagesMenu: main

params:
  env: production
  defaultTheme: dark
  disableThemeToggle: false
  enableEmoji: true
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowShareButtons: true
  dateFormat: "02.01.2006"
  author:
    - o10s
  homeInfoParams:
    title: "🏡 Welcome to my website 🐋"
    Content: |
      This is my simple place on the big internet so I can share what I do.  
      What I do is mostly composed of Kubernetes and Selfhosting but here and there you might find some
      food recipes and other stuff that I like.
  socialIcons:
    - name: "github"
      url: "https://github.com/o10s"
    - name: "email"
      url: "mailto:contact@o10s.ch"
  assets:
    favicon: "/images/favico/favicon.ico"
    favicon16x16:  "/images/favico/favicon-16x16.png"
    favicon32x32:  "/images/favico/favicon-32x32.png"
    apple_touch_icon:  "/images/favico/apple-touch-icon.png"
    safari_pinned_tab:  "/images/favico/safari-pinned-tab.svg"

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
  - name: Categories
    pageRef: /categories
    weight: 0
  - name: Tags
    pageRef: /tags
    weight: 0

